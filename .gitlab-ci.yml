stages:
  - build
  - package

build:
  image: eclipse-temurin:21-jdk
  stage: build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"
  cache:
    key: gradle-$CI_COMMIT_REF_SLUG
    paths:
      - .gradle/caches
      - .gradle/wrapper
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git-lfs
    - git lfs install
    - git lfs fetch --all
    - git lfs checkout
  script:
    - ./gradlew build

