container:finvi:
  image: eclipse-temurin:21-jdk
  stage: package
  only:
    - tags
  services:
    - docker:dind
  before_script:
    - mkdir -p $HOME/.docker
    - echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"$(echo -n "$DOCKER_HUB_USER:$DOCKER_HUB_PASS" | base64 -w0 )\"},\"$(echo -n $CI_REGISTRY)\":{\"auth\":\"$(echo -n "$CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD" | base64 -w0 )\"}}}" > $HOME/.docker/config.json
    - cat $HOME/.docker/config.json
  script:
    - VERSION=$(echo $CI_COMMIT_TAG | sed -s "s/^v//")
    - ./gradlew -Pversion=$VERSION :finvi:build
    - ./gradlew -Pversion=$VERSION :finvi:optimizedDockerBuild
    - ./gradlew -Pversion=$VERSION :finvi:optimizedDockerPush


