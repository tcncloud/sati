// Voice recording search and retrieval service.
//
// Extracted from gate/v2 GateService.
//
// Changes from v2:
//   - GetVoiceRecordingDownloadLink changed from GET-with-body to POST.
//   - SearchVoiceRecordings supports pagination instead of streaming-only.

syntax = "proto3";

package tcnapi.exile.recording.v3;

import "google/api/annotations.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "tcnapi/exile/types/v3/types.proto";

option go_package = "github.com/tcncloud/exileapi/tcnapi/exile/recording/v3;recordingv3";
option java_multiple_files = true;

service RecordingService {
  rpc SearchVoiceRecordings(SearchVoiceRecordingsRequest) returns (SearchVoiceRecordingsResponse) {
    option (google.api.http) = {
      post: "/tcnapi/exile/recording/v3/search"
      body: "*"
    };
  }

  rpc GetDownloadLink(GetDownloadLinkRequest) returns (GetDownloadLinkResponse) {
    option (google.api.http) = {
      post: "/tcnapi/exile/recording/v3/download_link"
      body: "*"
    };
  }

  rpc ListSearchableFields(ListSearchableFieldsRequest) returns (ListSearchableFieldsResponse) {
    option (google.api.http) = {get: "/tcnapi/exile/recording/v3/searchable_fields"};
  }

  rpc CreateLabel(CreateLabelRequest) returns (CreateLabelResponse) {
    option (google.api.http) = {
      post: "/tcnapi/exile/recording/v3/labels"
      body: "*"
    };
  }
}

// ---------------------------------------------------------------------------
// Messages
// ---------------------------------------------------------------------------

message SearchVoiceRecordingsRequest {
  repeated types.v3.Filter filters = 1;
  string page_token = 2;
  int32 page_size = 3;
}

message SearchVoiceRecordingsResponse {
  repeated Recording recordings = 1;
  string next_page_token = 2;
}

message Recording {
  string recording_id = 1;
  int64 call_sid = 2;
  types.v3.CallType call_type = 3;
  google.protobuf.Duration start_offset = 4;
  google.protobuf.Duration end_offset = 5;
  google.protobuf.Timestamp start_time = 6;
  google.protobuf.Duration duration = 7;
  string agent_phone = 8;
  string client_phone = 9;
  string campaign = 10;
  repeated string partner_agent_ids = 11;
  string label = 12;
  string value = 13;
}

message GetDownloadLinkRequest {
  string recording_id = 1;
  optional google.protobuf.Duration start_offset = 2;
  optional google.protobuf.Duration end_offset = 3;
}

message GetDownloadLinkResponse {
  string download_link = 1;
  string playback_link = 2;
}

message ListSearchableFieldsRequest {}

message ListSearchableFieldsResponse {
  repeated string fields = 1;
}

message CreateLabelRequest {
  int64 call_sid = 1;
  types.v3.CallType call_type = 2;
  string key = 3;
  string value = 4;
}

message CreateLabelResponse {}
