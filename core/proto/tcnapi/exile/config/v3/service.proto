// Configuration and lifecycle service.
//
// Extracted from gate/v2 GateService. Handles client configuration,
// organization info, certificate rotation, logging, and journey buffer.

syntax = "proto3";

package tcnapi.exile.config.v3;

import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "tcnapi/exile/types/v3/types.proto";

option go_package = "github.com/tcncloud/exileapi/tcnapi/exile/config/v3;configv3";
option java_multiple_files = true;

service ConfigService {
  // Get client configuration. Returns plugin config payload and org info.
  // config_payload is now a Struct instead of an opaque string.
  rpc GetClientConfiguration(GetClientConfigurationRequest) returns (GetClientConfigurationResponse) {
    option (google.api.http) = {get: "/tcnapi/exile/config/v3/client_configuration"};
  }

  rpc GetOrganizationInfo(GetOrganizationInfoRequest) returns (GetOrganizationInfoResponse) {
    option (google.api.http) = {get: "/tcnapi/exile/config/v3/organization_info"};
  }

  rpc RotateCertificate(RotateCertificateRequest) returns (RotateCertificateResponse) {
    option (google.api.http) = {
      post: "/tcnapi/exile/config/v3/rotate_certificate"
      body: "*"
    };
  }

  // Send log messages to the platform.
  rpc Log(LogRequest) returns (LogResponse) {
    option (google.api.http) = {
      post: "/tcnapi/exile/config/v3/log"
      body: "*"
    };
  }

  // Add a record to the journey/customer context buffer.
  rpc AddRecordToJourneyBuffer(AddRecordToJourneyBufferRequest) returns (AddRecordToJourneyBufferResponse) {
    option (google.api.http) = {
      post: "/tcnapi/exile/config/v3/journey_buffer"
      body: "*"
    };
  }
}

message GetClientConfigurationRequest {}

message GetClientConfigurationResponse {
  string org_id = 1;
  string org_name = 2;
  string config_name = 3;
  // Typed payload instead of opaque string. Consumers deserialize
  // into their plugin-specific config record.
  google.protobuf.Struct config_payload = 4;
}

message GetOrganizationInfoRequest {}

message GetOrganizationInfoResponse {
  string org_id = 1;
  string org_name = 2;
}

message RotateCertificateRequest {
  string certificate_hash = 1;
}

message RotateCertificateResponse {
  string encoded_certificate = 1;
}

message LogRequest {
  string payload = 1;
}

message LogResponse {}

message AddRecordToJourneyBufferRequest {
  types.v3.Record record = 1;
}

message AddRecordToJourneyBufferResponse {
  JourneyBufferStatus status = 1;

  enum JourneyBufferStatus {
    JOURNEY_BUFFER_STATUS_UNSPECIFIED = 0;
    JOURNEY_BUFFER_STATUS_INSERTED = 1;
    JOURNEY_BUFFER_STATUS_UPDATED = 2;
    JOURNEY_BUFFER_STATUS_IGNORED = 3;
    JOURNEY_BUFFER_STATUS_REJECTED = 4;
  }
}
